# =============================================================================
# OpenCost — Kubernetes Cost Monitoring
# =============================================================================
#
# WHY OPENCOST:
#   - CNCF project (same foundation as Kubernetes itself)
#   - Real-time cost allocation: per-pod, per-namespace, per-label
#   - GPU cost tracking (nvidia.com/gpu resource costs)
#   - Integrates with Prometheus (stores cost data as metrics)
#   - Free and open source (vs Kubecost enterprise)
#   - Shows exactly where your money goes — critical when GPUs cost $1-3/hr
#
# WHAT IT TRACKS:
#   - CPU cost per pod/namespace
#   - Memory cost per pod/namespace
#   - GPU cost per pod/namespace (uses nvidia.com/gpu resource requests)
#   - PV storage cost
#   - Network cost (if cloud provider pricing is configured)
#   - Idle cost (unused resources you're paying for)
#
# FOR YOUR DGX SPARK:
#   OpenCost still works on local clusters — it tracks resource consumption
#   even without cloud pricing. Useful for understanding resource allocation
#   and planning cloud migration costs.
#
# INSTALL COMMAND:
#   helm repo add opencost https://opencost.github.io/opencost-helm-chart
#   helm repo update
#   helm install opencost opencost/opencost \
#     --namespace monitoring --create-namespace \
#     --set opencost.prometheus.internal.serviceName=monitoring-kube-prometheus-prometheus \
#     --set opencost.prometheus.internal.namespaceName=monitoring \
#     --set opencost.ui.enabled=true
#
# ACCESS UI (dev/local):
#   kubectl port-forward svc/opencost -n monitoring 9090:9090
#   Open http://localhost:9090
#
# CONFIGURE CLOUD PRICING (optional, for EKS/GKE):
#   --set opencost.customPricing.enabled=true
#   --set opencost.customPricing.provider=aws
#   Or create a pricing ConfigMap with your actual on-demand/spot rates.
#
# =============================================================================

# The Helm chart creates all necessary resources. The ServiceMonitor below
# ensures Prometheus scrapes OpenCost's own metrics (cost data as time series).

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: opencost-monitor
  namespace: monitoring
  labels:
    app: opencost
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: opencost
  endpoints:
    - port: http
      path: /metrics
      interval: 60s       # Cost data doesn't change fast — 60s is plenty
      scrapeTimeout: 30s
  namespaceSelector:
    matchNames:
      - monitoring

# ---------------------------------------------------------------------------
# USEFUL PROMQL QUERIES (paste into Grafana):
#
# Total monthly cost by namespace:
#   sum(increase(opencost_total_cost[30d])) by (namespace)
#
# GPU cost vs CPU cost:
#   sum(opencost_gpu_cost) by (namespace)
#   sum(opencost_cpu_cost) by (namespace)
#
# Most expensive pods:
#   topk(10, sum(opencost_total_cost) by (pod))
#
# Idle resource cost (money you're wasting):
#   opencost_cluster_idle_cost
# ---------------------------------------------------------------------------
