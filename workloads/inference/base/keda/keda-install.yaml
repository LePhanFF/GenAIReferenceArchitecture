# KEDA (Kubernetes Event-Driven Autoscaling)
#
# KEDA is required for scale-to-zero on GPU workloads.
# Without KEDA, GPU pods run 24/7 even with zero traffic — wasting $1-3/hr per pod.
#
# Install KEDA via Helm (recommended):
#
#   helm repo add kedacore https://kedacore.github.io/charts
#   helm repo update
#   helm install keda kedacore/keda \
#     --namespace keda \
#     --create-namespace \
#     --version 2.15.1
#
# Or via kubectl:
#
#   kubectl apply --server-side \
#     -f https://github.com/kedacore/keda/releases/download/v2.15.1/keda-2.15.1.yaml
#
# Verify installation:
#
#   kubectl get pods -n keda
#   kubectl get crd | grep keda
#
# Required CRDs:
#   - scaledobjects.keda.sh
#   - scaledjobs.keda.sh
#   - triggerauthentications.keda.sh
#
# KEDA HTTP Add-On (optional, simplifies HTTP-based scaling):
#
#   helm install http-add-on kedacore/keda-add-ons-http \
#     --namespace keda \
#     --version 0.8.0
