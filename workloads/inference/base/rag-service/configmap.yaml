apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-service-config
  labels:
    app: rag-service
data:
  # vLLM inference endpoint (OpenAI-compatible API)
  LLM_BASE_URL: "http://vllm-inference.genai.svc.cluster.local:8000/v1"
  LLM_MODEL_NAME: "Qwen/Qwen2.5-1.5B-Instruct"

  # Embedding service endpoint (HuggingFace TEI)
  EMBEDDING_URL: "http://embedding-service.genai.svc.cluster.local:8080"
  EMBEDDING_MODEL_NAME: "sentence-transformers/all-MiniLM-L6-v2"

  # pgvector connection
  PGVECTOR_HOST: "pgvector.genai.svc.cluster.local"
  PGVECTOR_PORT: "5432"
  PGVECTOR_DATABASE: "vectordb"
  PGVECTOR_USER: "genai"

  # RAG configuration
  CHUNK_SIZE: "512"
  CHUNK_OVERLAP: "50"
  TOP_K: "5"
