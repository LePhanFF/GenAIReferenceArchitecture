apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: training
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: genai-platform
spec:
  description: Training cluster workloads — GPU-heavy, batch jobs, Jupyter

  # Only allow sources from our repo
  sourceRepos:
    - https://github.com/lehphyro/GenAIReferenceArchitecture.git

  # Restrict deployments to the genai namespace on the training cluster
  destinations:
    - namespace: genai
      server: https://kubernetes.default.svc
      name: training-dev

  # Allow all standard K8s resources
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

  namespaceResourceWhitelist:
    - group: ""
      kind: "*"
    - group: apps
      kind: "*"
    - group: batch
      kind: "*"
