apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inference-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: genai-platform
    environment: dev
    purpose: inference
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: inference

  source:
    repoURL: https://github.com/lehphyro/GenAIReferenceArchitecture.git
    targetRevision: main
    path: workloads/inference/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: genai

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true

    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/replicas
