apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: training-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: genai-platform
    environment: dev
    purpose: training
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: training

  source:
    repoURL: https://github.com/lehphyro/GenAIReferenceArchitecture.git
    targetRevision: main
    path: workloads/training/base

  destination:
    server: https://kubernetes.default.svc
    namespace: genai

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true

    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
