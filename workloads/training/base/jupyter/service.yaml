apiVersion: v1
kind: Service
metadata:
  name: jupyter
  labels:
    app: jupyter
spec:
  selector:
    app: jupyter
  ports:
    - port: 8888
      targetPort: 8888
      protocol: TCP
      name: http
  type: ClusterIP
  # Access via: kubectl port-forward svc/jupyter -n genai 8888:8888
  # Open http://localhost:8888 (token: genai)
