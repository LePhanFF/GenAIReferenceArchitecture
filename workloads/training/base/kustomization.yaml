apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: genai

resources:
  - namespace.yaml

  # Interactive development
  - jupyter/deployment.yaml
  - jupyter/service.yaml
  - jupyter/pvc.yaml

  # Persistent storage
  - storage/training-data-pvc.yaml
  - storage/checkpoints-pvc.yaml

  # Jobs
  - jobs/training-job.yaml
  - jobs/preprocessing-job.yaml

commonLabels:
  app.kubernetes.io/part-of: genai-platform
