# ArgoCD Installation
#
# Install ArgoCD via Helm (recommended for production):
#
#   helm repo add argo https://argoproj.github.io/argo-helm
#   helm repo update
#   helm install argocd argo/argo-cd \
#     --namespace argocd \
#     --create-namespace \
#     --version 7.3.11 \
#     --set server.service.type=LoadBalancer
#
# Or via kubectl (quick start):
#
#   kubectl create namespace argocd
#   kubectl apply -n argocd \
#     -f https://raw.githubusercontent.com/argoproj/argo-cd/v2.12.3/manifests/install.yaml
#
# Get the initial admin password:
#
#   kubectl -n argocd get secret argocd-initial-admin-secret \
#     -o jsonpath="{.data.password}" | base64 -d
#
# Port-forward the ArgoCD UI:
#
#   kubectl port-forward svc/argocd-server -n argocd 8080:443
#   # Open https://localhost:8080, login as "admin" with the password above
#
# Deploy the GenAI platform:
#
#   argocd app create -f k8s/argocd/application.yaml
#
#   # Or via kubectl:
#   kubectl apply -f k8s/argocd/application.yaml
#
# Verify:
#
#   argocd app get genai-platform
#   argocd app sync genai-platform
