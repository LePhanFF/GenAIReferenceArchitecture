apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: genai-platform
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: genai-platform
  # Finalizer ensures ArgoCD cleans up resources when the Application is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Point to your repo — update this URL to match your actual repository
    repoURL: https://github.com/lehphyro/GenAIReferenceArchitecture.git
    targetRevision: main
    path: k8s/overlays/dev

  destination:
    # Deploy to the local cluster (where ArgoCD is running)
    server: https://kubernetes.default.svc
    namespace: genai

  syncPolicy:
    # AUTO-SYNC: ArgoCD will automatically apply changes when commits land on main.
    # This is the GitOps loop — push to Git, ArgoCD deploys.
    automated:
      # Prune: delete resources that are removed from Git
      prune: true
      # Self-heal: revert manual changes made outside of Git
      # If someone kubectl-edits a deployment, ArgoCD will revert it.
      selfHeal: true
      # Allow empty: don't fail if the path has no resources (useful during setup)
      allowEmpty: false

    syncOptions:
      # Create the namespace if it doesn't exist
      - CreateNamespace=true
      # Apply out of sync only — don't re-apply unchanged resources
      - ApplyOutOfSyncOnly=true
      # Server-side apply for better conflict resolution
      - ServerSideApply=true

    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Ignore differences that are set by controllers (avoid sync loops)
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/replicas
